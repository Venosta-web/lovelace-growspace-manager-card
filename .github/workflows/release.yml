name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/growspace-manager-card.js
